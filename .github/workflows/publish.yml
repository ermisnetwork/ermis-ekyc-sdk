name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # ── Core SDK ─────────────────────────────────────────

      - name: Install core SDK dependencies
        run: npm ci

      - name: Lint core SDK
        run: npm run lint

      - name: Test core SDK
        run: npm test

      - name: Build core SDK
        run: npm run build

      - name: Publish core SDK
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── React SDK ────────────────────────────────────────

      - name: Install React SDK dependencies
        run: |
          cd packages/react
          npm install

      - name: Test React SDK
        run: |
          cd packages/react
          npm test

      - name: Build React SDK
        run: npm run build:react

      - name: Publish React SDK
        run: |
          cd packages/react
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
