name: Deploy Docs & Demo

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "examples/demo/**"
      - "packages/**"
      - "src/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      # ── Build Docs ────────────────────────────────────────
      - name: Install docs dependencies
        run: |
          cd docs
          npm ci

      - name: Build Docusaurus
        run: |
          cd docs
          npm run build

      # ── Build Core SDK ────────────────────────────────────
      - name: Install core SDK dependencies
        run: npm ci

      - name: Build core SDK
        run: npm run build

      # ── Build React SDK ───────────────────────────────────
      - name: Install React SDK dependencies
        run: |
          cd packages/react
          rm -f package-lock.json
          npm install --ignore-scripts

      - name: Build React SDK
        run: npm run build:react

      # ── Build Demo ────────────────────────────────────────
      - name: Install demo dependencies
        run: |
          cd examples/demo
          rm -f package-lock.json
          npm install --ignore-scripts

      - name: Build demo
        run: |
          cd examples/demo
          npm run build

      # ── Combine & Upload ──────────────────────────────────
      - name: Copy demo build into docs output
        run: |
          mkdir -p docs/build/demo
          cp -r examples/demo/dist/* docs/build/demo/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
